<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rent House</title>
    
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Bootstrap CSS -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- Your CSS -->

    <link rel="stylesheet" href="style.css">

    <!-- jQuery -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

    <!-- HEADER -->

    <div id="header"></div>

    <!-- MAIN CONTENT -->

    <main class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card p-4 shadow">

                <h1 class="text-center mb-4">
                    Find Rental House
                </h1>

                <form>



                    <div class="mb-3">
                    
                        <label class="form-label">
                            Select House Type
                        </label>
                    
                        <select class="form-select">
                        
                            <option selected disabled>
                                Choose BHK
                            </option>
                        
                            <option>1 BHK</option>
                        
                            <option>2 BHK</option>
                        
                            <option>3 BHK</option>
                        
                            <option>4 BHK</option>
                        
                        </select>
                    
                    </div>
                
                    <!-- BUDGET -->
                
                    <div class="mb-3">
                    
                        <label class="form-label">
                            Monthly Rent Budget
                        </label>
                    
                        <select class="form-select">
                        
                            <option selected disabled>
                                Select Budget
                            </option>
                        
                            <option>₹ 5,000 - ₹ 10,000</option>
                        
                            <option>₹ 10,000 - ₹ 20,000</option>
                        
                            <option>₹ 20,000 - ₹ 40,000</option>
                        
                            <option>Above ₹ 40,000</option>
                        
                        </select>
                    
                    </div>
                
                    <!-- CITY -->
                
                    <div class="mb-3">
                    
                        <label class="form-label">
                            City
                        </label>
                    
                        <input
                        type="text"
                        class="form-control"
                        placeholder="Ahmedabad">
                    
                    </div>

                    <div class="mb-3">
                    
                        <label class="form-label">
                            Area
                        </label>
                    
                        <input
                        type="text"
                        class="form-control"
                        placeholder="Bopal">
                    
                    </div>
                

                
                    <button class="btn btn-primary w-100">
                    
                        Search Rental House
                    
                    </button>

                </form>

            <hr class="my-4">

            <h3 class="text-center mb-4">
                Available Rental Houses
            </h3>

            <div class="row g-4">
            
            
                <div class="col-md-6">
                
                    <div class="card h-100 shadow-sm rent-card">
                    
                        <img
                        src="images/Magnate_lifestyle.jpeg"
                        class="card-img-top"
                        alt="House">
                    
                        <div class="card-body">
                        
                            <h5 class="card-title">
                                Magnate Lifestyle
                            </h5>
                        
                            <p class="card-text">
                                ₹ 25,000 / month
                            </p>
                        
                            <p class="card-text">
                                Ahmedabad, Gujarat
                            </p>
                        
                            <button class="btn btn-primary w-100">
                                View Details
                            </button>
                        
                        </div>
                    
                    </div>
                
                </div>
            
            
                <div class="col-md-6">
                
                    <div class="card h-100 shadow-sm rent-card">
                    
                        <img
                        src="images/Dev.jpeg"
                        class="card-img-top"
                        alt="House">
                    
                          <div class="card-body">
                        
                            <h5 class="card-title">
                                Dev Parijat
                            </h5>
                        
                            <p class="card-text">
                                ₹ 18,000 / month
                            </p>
                        
                            <p class="card-text">
                                Satellite, Ahmedabad
                            </p>
                        
                            <button class="btn btn-primary w-100">
                                View Details
                            </button>
                        
                        </div>
                    
                    </div>
                
                </div>
            
            </div>

            </div>

        </div>

    </div>


    </main>


    <div id="footer"></div>

    <script>

        $(function(){

            $("#header").load("header.html");

            $("#footer").load("footer.html");

        });

    </script>

</body>

</html>

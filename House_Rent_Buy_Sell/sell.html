<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sell Property</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

    <div id="header"></div>

    <!-- MAIN CONTENT -->

<main class="sell-page">

    <form class="sell-form">

        <h1>Sell Property</h1>

        <div class="form-group">

            <label>Select House Type</label>

            <select required>

                <option value="">Choose BHK</option>

                <option>2 BHK</option>

                <option>3 BHK</option>

                <option>4 BHK</option>

                <option>5 BHK</option>

            </select>

        </div>

        <div class="form-group">

            <label>Size in sqyard</label>

            <input type="number" id="size" placeholder="150">

        </div>


        <div class="form-group">

            <label>City</label>

            <input type="text" id="city" required placeholder="Ahmedabad">

        </div>

        <div class="form-group">

            <label>Area</label>

            <input type="text" id="area" required placeholder="Vaishnodevi">

        </div>


        <div class="form-group">

            <label>Property Name</label>

            <input type="text" id="pn" required placeholder="Shivalik Drone">

        </div>

        <div class="form-group">

            <label>Price</label>

            <input type="number" id="price" placeholder="5000000">

        </div>

        <div class="form-group">

            <label>Contact Number</label>

            <input type="tel" id="ph" placeholder="9898998656">

        </div>

        <div class="form-group">

            <label>Upload Property Image</label>

            <input type="file" id="property-image" accept="image/*">

        </div>

        <button class="btn btn-primary">
            Submit
        </button>

    </form> 

</main>


<div id="footer"></div>


    <script>

        $(function(){

            $("#header").load("header.html");

            $("#footer").load("footer.html");

        });

    </script>

</body>

</html>

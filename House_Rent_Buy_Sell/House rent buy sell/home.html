<!DOCTYPE html>
<html>

<head>

    <title>House Finder</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

    <div id="header"></div>

    <h1>Welcome to House Finder</h1>

    <form action="result.html">

        <h2>Find Your House</h2>

        <label>City:</label>

        <select required>

            <option value="">Select City</option>

            <option>Ahmedabad</option>

            <option>Surat</option>

            <option>Vadodara</option>

            <option>Rajkot</option>

            <option>Mehsana</option>

        </select>

        <br><br>

        <label>Area:</label>

        <select required>

            <option value="">Select Area</option>

            <option>Vaishnodevi</option>

            <option>Gota</option>

            <option>Sindhubhavan</option>

            <option>Bopal</option>

        </select>

        <br><br>

        <label>Property Type:</label>

        <input type="radio" name="type" required> Rent

        <input type="radio" name="type"> Buy

        <br><br>

        <label>BHK:</label>

        <select required>

            <option value="">Select BHK</option>

            <option>2 BHK</option>

            <option>3 BHK</option>

            <option>4 BHK</option>

            <option>5 BHK</option>

        </select>

        <br><br>

        <label for="budget">Budget:</label>

        <input type="range"
               id="budget"
               min="3000000"
               max="30000000"
               value="5000000"
               step="100000"
               oninput="output.value = budget.value">

        <output id="output">5000000</output>

        <br><br>

        <button type="submit">Search</button>

    </form>

    <div id="footer"></div>

    <script>

    $(function(){

        $("#header").load("header.html");

        $("#footer").load("footer.html");

    });

    </script>

</body>

</html>

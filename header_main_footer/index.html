<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Example</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <p>This is Header line</p>
    </div>

    <div class="header navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>

    <div class="container">

        <div class="left">
            <p>This is Left Side</p>

            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>

        <div class="center">
            <p>This is Main Center Content</p>
        </div>

        <div class="right">
            <img src="images/Dev.jpeg" alt="Sample Image">
            <p>This is Right Side</p>
        </div>

    </div>

    <footer class="footer">
        <p>&copy; This is Footer</p>

        <a href="https://www.instagram.com">Instagram</a>
        <a href="https://www.facebook.com">Facebook</a>
        <a href="https://www.twitter.com">Twitter</a>
    </footer>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
    <title>Simple Form</title>
    <link rel="stylesheet" href="css_for_student_form.css">
</head>
<body>

    <h2>Student Registration Form</h2>

    <form>

        <label>Full Name:</label><br>
        <input type="text" placeholder="Enter your name"><br><br>

        <label>Email:</label><br>
        <input type="email" placeholder="Enter your email"><br><br> 

        <label>Password:</label><br>
        <input type="password" placeholder="Enter password"><br><br>

        <label>Date of Birth:</label><br>
        <input type="date"><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" placeholder="Enter phone number"><br><br>

        <label>Age:</label><br>
        <input type="hidden" placeholder="Enter age"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female<br><br>

        <label>Hobbies:</label><br>
        <input type="checkbox"> Reading
        <input type="checkbox"> Sports
        <input type="checkbox"> Music<br><br>

        <label>Study Hours Per Day:</label>

        <input type="range" min="0" max="15" value="5"
        oninput="result.value=this.value"> 
        <output name="result">5</output>
        <br><br>

        <input type="submit" value="Submit">

    </form>

</body>
</html>
